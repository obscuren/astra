name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Release builds
          - os: ubuntu-latest
            artifact: astra-linux-x86_64
            c_compiler: gcc
            cpp_compiler: g++
            dev: OFF
            binary: astra
          - os: macos-latest
            artifact: astra-macos-arm64
            c_compiler: clang
            cpp_compiler: clang++
            dev: OFF
            binary: astra
          - os: windows-latest
            artifact: astra-windows-x86_64
            c_compiler: cl
            cpp_compiler: cl
            dev: OFF
            binary: astra
          # Dev builds
          - os: ubuntu-latest
            artifact: astra-dev-linux-x86_64
            c_compiler: gcc
            cpp_compiler: g++
            dev: ON
            binary: astra-dev
          - os: macos-latest
            artifact: astra-dev-macos-arm64
            c_compiler: clang
            cpp_compiler: clang++
            dev: ON
            binary: astra-dev
          - os: windows-latest
            artifact: astra-dev-windows-x86_64
            c_compiler: cl
            cpp_compiler: cl
            dev: ON
            binary: astra-dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=Release
          -DDEV=${{ matrix.dev }}
          -DASTRA_RELEASE_VERSION=${{ github.ref_name }}
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp build/${{ matrix.binary }} staging/
          cp LICENSE README.md staging/
          tar czf ${{ matrix.artifact }}.tar.gz -C staging .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp build/Release/${{ matrix.binary }}.exe staging/
          cp LICENSE README.md staging/
          cd staging && 7z a -tzip ../${{ matrix.artifact }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.ref_name }}"
          # If a release already exists (created manually with notes),
          # just upload the binaries. Otherwise create a new release.
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" \
              astra-linux-x86_64.tar.gz \
              astra-macos-arm64.tar.gz \
              astra-windows-x86_64.zip \
              astra-dev-linux-x86_64.tar.gz \
              astra-dev-macos-arm64.tar.gz \
              astra-dev-windows-x86_64.zip \
              --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              astra-linux-x86_64.tar.gz \
              astra-macos-arm64.tar.gz \
              astra-windows-x86_64.zip \
              astra-dev-linux-x86_64.tar.gz \
              astra-dev-macos-arm64.tar.gz \
              astra-dev-windows-x86_64.zip
          fi
